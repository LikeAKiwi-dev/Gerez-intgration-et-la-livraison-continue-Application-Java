name: CI

on:
  push:
    branches: ["main", "ci-test"]
  pull_request:

permissions:
  contents: read
  checks: write
  packages: write

jobs:
  test:
    name: Tests (auto Angular/Java)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project type
        id: detect
        shell: bash
        run: |
          if [[ -f "package.json" && -f "karma.conf.js" ]]; then
            echo "type=angular" >> "$GITHUB_OUTPUT"
          elif [[ -f "gradlew" || -f "gradlew.bat" ]] && ( [[ -f "build.gradle" ]] || [[ -f "build.gradle.kts" ]] ); then
            echo "type=gradle" >> "$GITHUB_OUTPUT"
          else
            echo "type=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if unknown project
        if: steps.detect.outputs.type == 'unknown'
        shell: bash
        run: |
          echo "Projet non détecté. Attendu:"
          echo "- Angular: package.json + karma.conf.js"
          echo "- Gradle: gradlew(.bat) + build.gradle(.kts)"
          exit 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Chrome (Angular)
        if: steps.detect.outputs.type == 'angular'
        uses: browser-actions/setup-chrome@v1

      - name: Setup Node (Angular)
        if: steps.detect.outputs.type == 'angular'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Setup Java (Gradle)
        if: steps.detect.outputs.type == 'gradle'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Run tests (run-tests.py)
        run: python run-tests.py

      - name: Collect JUnit reports into test-results/
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-results
          
          # Sources possibles selon projet (Angular / Gradle / ton script)
          for d in reports build/test-results test-results; do
            if [ -d "$d" ]; then
              find "$d" -type f -name "*.xml" -print -exec cp -n {} test-results/ \; || true
            fi
          done
          
          echo "=== Final test-results content ==="
          ls -la test-results || true

      - name: Upload JUnit XML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/**/*.xml
          if-no-files-found: ignore

      - name: Publish test report
        if: always() && hashFiles('test-results/**/*.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: test-results/**/*.xml
          reporter: java-junit
          fail-on-error: "false"

  build:
    name: Build & Push Docker image (GHCR)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute tag (branch-sha)
        id: tag
        shell: bash
        run: |
          SHA7="${GITHUB_SHA:0:7}"
          BRANCH_SAFE="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"

          IMAGE_RAW="ghcr.io/${GITHUB_REPOSITORY}"
          IMAGE_LC="$(echo "${IMAGE_RAW}" | tr '[:upper:]' '[:lower:]')"

          echo "image=${IMAGE_LC}" >> "$GITHUB_OUTPUT"
          echo "tag=${BRANCH_SAFE}-${SHA7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (retry)
        if: github.event_name == 'push'
        shell: bash
        env:
          USERNAME: ${{ github.actor }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            echo "$PASSWORD" | docker login ghcr.io -u "$USERNAME" --password-stdin && exit 0
            echo "Login GHCR échoué (tentative $i/5) → retry dans 10s..."
            sleep 10
          done
          exit 1

      - name: Build (and push on push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Release (semantic-release)
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx -y semantic-release@24 \
            -p @semantic-release/commit-analyzer \
            -p @semantic-release/release-notes-generator \
            -p @semantic-release/github

      - name: Read version from latest git tag
        id: vtag
        shell: bash
        run: |
          if TAG="$(git describe --tags --abbrev=0 2>/dev/null)"; then
            VERSION="${TAG#v}"
          else
            VERSION=""
          fi

          IMAGE_RAW="ghcr.io/${GITHUB_REPOSITORY}"
          IMAGE_LC="$(echo "${IMAGE_RAW}" | tr '[:upper:]' '[:lower:]')"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.vtag.outputs.version != ''
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR (retry)
        if: steps.vtag.outputs.version != ''
        shell: bash
        env:
          USERNAME: ${{ github.actor }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for i in 1 2 3 4 5; do
            echo "$PASSWORD" | docker login ghcr.io -u "$USERNAME" --password-stdin && exit 0
            echo "Login GHCR échoué (tentative $i/5) → retry dans 10s..."
            sleep 10
          done
          exit 1

      - name: Build & Push versioned image
        if: steps.vtag.outputs.version != ''
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vtag.outputs.image }}:${{ steps.vtag.outputs.version }}
            ${{ steps.vtag.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max